version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0.35
    container_name: stock-analysis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: stock_analysis_db
      MYSQL_USER: stock_user
      MYSQL_PASSWORD: stock_password
      TZ: 'Asia/Shanghai'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/app/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - stock-analysis-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7.0-alpine
    container_name: stock-analysis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stock-analysis-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Backend FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock-analysis-backend
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: mysql+pymysql://stock_user:stock_password@mysql:3306/stock_analysis_db
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - stock-analysis-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Frontend React Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock-analysis-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - stock-analysis-network
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:8000/api/v1
    command: npm run dev
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: stock-analysis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    networks:
      - stock-analysis-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

networks:
  stock-analysis-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
