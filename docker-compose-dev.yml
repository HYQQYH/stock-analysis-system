version: '3.9'

services:
  # PostgreSQL 15 Database Service
  postgres:
    image: postgres:15-alpine
    container_name: stock_analysis_postgres
    environment:
      POSTGRES_DB: stock_analysis_db
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_pass_2026
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/schema_pg.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - stock_analysis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user -d stock_analysis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 7 Cache Service
  redis:
    image: redis:7-alpine
    container_name: stock_analysis_redis
    command: redis-server --appendonly yes --requirepass redis_pass_2026
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - stock_analysis_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend Service (optional - for testing)
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: stock_analysis_backend
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://stock_user:stock_pass_2026@postgres:5432/stock_analysis_db
  #     REDIS_URL: redis://:redis_pass_2026@redis:6379
  #     PYTHONUNBUFFERED: 1
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - ./backend:/app
  #   networks:
  #     - stock_analysis_network
  #   restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  stock_analysis_network:
    driver: bridge
